# Server Configuration
server.port=${PORT:8080}

# Database Configuration - supports both local and Railway
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/test_framework?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.archive.autodetection=class
spring.jpa.open-in-view=false

